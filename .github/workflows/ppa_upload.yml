name: PPA Upload

on:
  push:
    tags:
      - "v*"

jobs:
  ppa_upload:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts dupload gnupg2 unzip
          # Install Bazel 6.5.0
          curl -fSsL https://github.com/bazelbuild/bazel/releases/download/6.5.0/bazel-6.5.0-linux-x86_64 -o bazel
          chmod +x bazel
          sudo mv bazel /usr/local/bin/bazel-6.5.0
          sudo ln -s /usr/local/bin/bazel-6.5.0 /usr/local/bin/bazel

      - name: Import GPG Key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_PASSPHRASE }}" | gpg --batch --passphrase-fd 0 --pinentry-mode loopback --import

      - name: Vendor Dependencies
        run: |
          mkdir -p vendor_deps
          bazel fetch //pycoral:wheel
          # Copy repository cache to vendor_deps for offline build
          # Note: This is a simplified version, real path may vary based on bazel version/config
          cp -r $(bazel info repository_cache)/* vendor_deps/ || true

      - name: Build Source Package
        run: |
          debuild -S -sa -kEA420FDED8594882 -p"gpg --batch --passphrase ${{ secrets.GPG_PASSPHRASE }} --pinentry-mode loopback"

      - name: Upload to PPA
        run: |
          dput ppa:dutch2005/pycoral-modernized ../libedgetpu_*.changes
