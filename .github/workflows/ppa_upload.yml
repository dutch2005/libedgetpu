name: PPA Upload

on:
  push:
    tags:
      - 'v*'

jobs:
  ppa_upload:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Bazel and Vendor Deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            vendor_deps
          key: ${{ runner.os }}-build-v2-${{ hashFiles('**/BUILD', '**/BUILD.bazel', 'WORKSPACE', 'workspace.bzl', 'debian/control') }}
          restore-keys: |
            ${{ runner.os }}-build-v2-

      - name: Install dependencies
        run: |
          # Remove snap to speed up the runner and prevent slow background updates
          sudo apt-get remove -y snapd
          sudo apt-get purge -y snapd
          sudo apt-get autoremove -y
          
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dh-python devscripts dput dupload gnupg2 unzip libusb-1.0-0-dev software-properties-common python3-dev python3-all-dev python3-numpy
          python3 -m pip install --break-system-packages twine
          
          if [ ! -f /usr/local/bin/bazel-6.5.0 ]; then
            # Added retries to handle intermittent 502/503 errors from GitHub
            curl -fSsL --retry 5 --retry-delay 5 https://github.com/bazelbuild/bazel/releases/download/6.5.0/bazel-6.5.0-linux-x86_64 -o bazel
            chmod +x bazel
            sudo mv bazel /usr/local/bin/bazel-6.5.0
          fi
          sudo ln -sf /usr/local/bin/bazel-6.5.0 /usr/local/bin/bazel

      - name: Import GPG Key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Vendor Dependencies
        run: |
          mkdir -p vendor_deps
          # Fetch all dependencies. The .bazelrc will automatically use vendor_deps as a distribution directory.
          bazel fetch //pycoral:wheel

      - name: Build Source Package
        run: |
          # Create a fake orig tarball if it doesn't exist, as required by debuild for source packages
          # This is a common pattern for 'native' or unified repositories
          tar -czf ../pycoral_2.0.0.orig.tar.gz --exclude=.git --exclude=vendor_deps .
          
          # Build the source package
          # -S: Build source package
          # -sa: Force inclusion of original source (required for first upload)
          # -k: Use GPG key ID
          # -p: Passphrase configuration
          debuild -S -sa -kEA420FDED8594882 -p"gpg --batch --passphrase ${{ secrets.GPG_PASSPHRASE }} --pinentry-mode loopback"

      - name: Upload to PPA
        run: |
          dput -v ppa:dutch2005/pycoral-modernized ../pycoral_*.changes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ../pycoral_*.dsc
            ../pycoral_*.orig.tar.gz
            ../pycoral_*.debian.tar.xz
            ../pycoral_*.changes
            bazel-bin/pycoral/*.whl
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          # The wheels are already built in the Build Source Package phase (via debian/rules)
          # We use twine to upload them to GitHub Packages (which acts as a private PyPI)
          export TWINE_USERNAME=${{ github.actor }}
          export TWINE_PASSWORD=${{ secrets.GITHUB_TOKEN }}
          export TWINE_REPOSITORY_URL=https://maven.pkg.github.com/${{ github.repository }}
          twine upload --skip-existing bazel-bin/pycoral/*.whl

      - name: Sync to PyCoral Repo
        run: |
          # Setup SSH key for the pycoral repo
          mkdir -p ~/.ssh
          echo "${{ secrets.SYNC_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          
          # Add remote and push
          git remote add pycoral git@github.com:dutch2005/pycoral.git
          git push pycoral master --force
          git push pycoral --tags --force
