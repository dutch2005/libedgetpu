name: PPA Upload

on:
  push:
    tags:
      - 'v*'

jobs:
  ppa_upload:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Removed cache: "maven" as it causes errors when no pom.xml exists

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            vendor_deps
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/BUILD', '**/BUILD.bazel', 'WORKSPACE', 'workspace.bzl') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts dupload gnupg2 unzip libusb-1.0-0-dev software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.9-dev python3.10-dev python3.11-dev python3.12-dev python3.13-dev python3.14-dev
          
          if [ ! -f /usr/local/bin/bazel-6.5.0 ]; then
            curl -fSsL https://github.com/bazelbuild/bazel/releases/download/6.5.0/bazel-6.5.0-linux-x86_64 -o bazel
            chmod +x bazel
            sudo mv bazel /usr/local/bin/bazel-6.5.0
          fi
          sudo ln -sf /usr/local/bin/bazel-6.5.0 /usr/local/bin/bazel

      - name: Import GPG Key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Vendor Dependencies
        run: |
          mkdir -p vendor_deps
          export BAZEL_JAVABASE=$JAVA_HOME
          bazel --server_javabase=$JAVA_HOME fetch //pycoral:wheel
          cp -r $(bazel info repository_cache)/* vendor_deps/ || true

      - name: Build Source Package
        run: |
          debuild -S -sa -kEA420FDED8594882 -p"gpg --batch --passphrase ${{ secrets.GPG_PASSPHRASE }} --pinentry-mode loopback"

      - name: Upload to PPA
        run: |
          dput ppa:dutch2005/pycoral-modernized ../libedgetpu_*.changes
