name: Unit Tests

on:
  push:
    branches: [ master, modernized-2026 ]
  pull_request:
    branches: [ master, modernized-2026 ]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-test-${{ hashFiles('**/BUILD', 'WORKSPACE', 'MODULE.bazel') }}
          restore-keys: |
            ${{ runner.os }}-bazel-test-

      - name: Install Bazel
        run: |
          if [ ! -f /usr/local/bin/bazel-6.5.0 ]; then
            curl -fSsL --retry 5 --retry-delay 5 https://github.com/bazelbuild/bazel/releases/download/6.5.0/bazel-6.5.0-linux-x86_64 -o bazel
            chmod +x bazel
            sudo mv bazel /usr/local/bin/bazel-6.5.0
          fi
          sudo ln -sf /usr/local/bin/bazel-6.5.0 /usr/local/bin/bazel

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libusb-1.0-0-dev lcov

      - name: Run Tests with Coverage
        run: |
          bazel test --collect_code_coverage \
            --combined_report=lcov \
            //src/api:allocated_buffer_test \
            //src/api:buffer_test \
            //src/api:watchdog_test \
            //src/driver/memory:mmu_mapper_test

      - name: Generate Coverage Report
        run: |
          # The combined coverage file is usually at bazel-out/_coverage/_combined_report.dat
          REPORT_PATH=$(bazel info output_path)/_coverage/_combined_report.dat
          if [ -f "$REPORT_PATH" ]; then
            lcov --summary "$REPORT_PATH"
          else
            echo "Coverage report not found at $REPORT_PATH"
          fi

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: bazel-testlogs/
